@if (visible) {
<div class="eu-backdrop fixed inset-0 z-[60] flex items-center justify-center p-4" (click)="onBackdropClick($event)">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity duration-180 ease-out"
    [class.opacity-100]="animating" [class.opacity-0]="!animating"></div>
  <div class="relative w-full max-w-lg bg-white rounded-2xl shadow-2xl border border-slate-200/80
             transition-all duration-180 ease-out" [class.opacity-100]="animating" [class.opacity-0]="!animating"
    [class.scale-100]="animating" [class.scale-95]="!animating" [class.translate-y-0]="animating"
    [class.-translate-y-2]="!animating" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-sm">
          <span class="material-symbols-outlined text-white text-[20px]">meeting_room</span>
        </div>
        <div>
          <h3 class="text-base font-bold text-slate-800">Add New Room</h3>
          <p class="text-xs text-slate-500 mt-0.5">Step {{ step }} of 2</p>
        </div>
      </div>
      <button (click)="close()" [disabled]="isSaving || isStepOneLoading" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-slate-700
                 hover:bg-slate-100 rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </div>

    <!-- Content -->
    <div class="px-6 py-5">
      <!-- Step 1: Room Details -->
      @if (step === 1) {
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Room Name <span class="text-red-500">*</span>
          </label>
          <input type="text" [(ngModel)]="roomName" maxlength="50"
            placeholder="Enter room name (e.g., Conference Room A)" [disabled]="isSaving || isStepOneLoading" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800
                       focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500
                       disabled:bg-slate-50 disabled:text-slate-400 transition-all placeholder:text-slate-400" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Device UID <span class="text-red-500">*</span>
          </label>
          <app-drop-down [options]="deviceOptions" [value]="selectedDevice" [disabled]="isSaving || isStepOneLoading"
            placeholder="Select a device UID" variant="device" icon="memory" (valueChange)="selectedDevice = $event" />
        </div>

        <div class="pt-2 px-4 py-3 bg-blue-50 border border-blue-100 rounded-xl">
          <div class="flex gap-2">
            <span class="material-symbols-outlined text-blue-600 text-[18px] flex-shrink-0 mt-0.5">info</span>
            <p class="text-xs text-blue-700">Make sure the room name is unique and the device is available.</p>
          </div>
        </div>
      </div>
      }

      <!-- Step 2: Add Schedules -->
      @if (step === 2) {
      <app-schedule-builder [schedules]="schedules" (schedulesChange)="schedules = $event" [disabled]="isSaving"
        variant="add" />
      }
    </div>

    <!-- Footer -->
    <div
      class="flex items-center justify-between gap-3 px-6 py-4 border-t border-slate-100 bg-slate-50/50 rounded-b-2xl">
      @if (step === 2) {
      <button (click)="step = 1" [disabled]="isSaving || isStepOneLoading" class="px-4 py-2.5 text-sm font-semibold text-slate-600 bg-white border border-slate-200
                   rounded-xl hover:bg-slate-50 hover:border-slate-300 transition-colors
                   disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1.5">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        Back
      </button>
      }

      <div class="flex-1"></div>

      @if (step === 1) {
      <button (click)="close()" [disabled]="isSaving || isStepOneLoading" class="px-5 py-2.5 text-sm font-semibold text-slate-600 bg-white border border-slate-200
                   rounded-xl hover:bg-slate-50 hover:border-slate-300 transition-colors
                   disabled:opacity-50 disabled:cursor-not-allowed">
        Cancel
      </button>
      }

      @if (step === 1) {
      <button (click)="nextStep()" [disabled]="isSaving || isStepOneLoading" class="px-5 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700
                   rounded-xl shadow-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed
                   flex items-center gap-2">
        @if (isStepOneLoading) {
        <span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span>
        }
        @if (!isStepOneLoading) {
        <span>Next</span>
        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        }
        @if (isStepOneLoading) {
        <span>Checking...</span>
        }
      </button>
      }

      @if (step === 2) {
      <button (click)="onSave()" [disabled]="isSaving" class="px-5 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700
                   rounded-xl shadow-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed
                   flex items-center gap-2">
        @if (isSaving) {
        <span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span>
        } @else {
        <span class="material-symbols-outlined text-[18px]">check</span>
        }
        {{ isSaving ? 'Creating...' : 'Create Room' }}
      </button>
      }
    </div>
  </div>
</div>
}
