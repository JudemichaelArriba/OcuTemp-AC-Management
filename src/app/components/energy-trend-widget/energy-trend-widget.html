<div class="relative overflow-hidden rounded-[2.5rem] border border-white bg-white shadow-2xl shadow-slate-200/60 transition-all duration-300 w-full">
  <div class="p-8">
    
    <div class="mb-8 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6">

      <div class="flex items-center gap-4">
        <div class="w-2 h-8 bg-blue-600 rounded-full"></div>
        <div>
          <h3 class="text-sm font-black text-slate-900 uppercase tracking-[0.15em]">Consumption Trend</h3>
          <p class="text-xs text-slate-400 font-medium">Historical performance across the facility</p>
        </div>
      </div>


      <div class="flex flex-wrap items-center gap-4">
        <div class="flex items-center bg-slate-100/50 backdrop-blur-md p-1.5 rounded-2xl border border-slate-200/50 shadow-inner">
          <button (click)="setFilter('daily')"
            [class]="filterMode === 'daily' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-500 hover:text-blue-600'"
            class="px-5 py-2 rounded-xl text-[10px] font-black tracking-widest uppercase transition-all duration-300">
            Daily
          </button>
          <button (click)="setFilter('weekly')"
            [class]="filterMode === 'weekly' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-500 hover:text-blue-600'"
            class="px-5 py-2 rounded-xl text-[10px] font-black tracking-widest uppercase transition-all duration-300">
            Weekly
          </button>
          <button (click)="setFilter('monthly')"
            [class]="filterMode === 'monthly' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-500 hover:text-blue-600'"
            class="px-5 py-2 rounded-xl text-[10px] font-black tracking-widest uppercase transition-all duration-300">
            Monthly
          </button>
        </div>

        <span class="text-[10px] font-black text-blue-600 bg-blue-50 border border-blue-100 px-4 py-2.5 rounded-2xl tracking-widest uppercase">
          kWh Units
        </span>
      </div>
    </div>


    <div class="h-[350px] w-full rounded-2xl bg-slate-50/50 p-4 border border-slate-100">
      <canvas #overallChartCanvas></canvas>
    </div>
    
  </div>
</div>
