<div
  class="relative overflow-hidden rounded-[2.5rem] border border-white bg-white shadow-2xl shadow-slate-200/60 transition-all duration-300 w-full">
  <div class="p-4 sm:p-8">

    <div class="mb-8 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6">

      <div class="flex items-center gap-4">
        <div class="w-2 h-8 bg-blue-600 rounded-full"></div>
        <div>
          <h3 class="text-sm font-black text-slate-900 uppercase tracking-[0.15em]">Consumption Trend</h3>
          <p class="text-xs text-slate-400 font-medium">Historical performance across the facility</p>
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-4">

        <div
          class="flex-1 min-w-0 p-1.5 bg-slate-100/50 backdrop-blur-md rounded-2xl border border-slate-200/50 shadow-inner">
          <div class="relative grid grid-cols-4 items-center">

            <div
              class="absolute inset-y-0 left-0 w-1/4 bg-blue-600 rounded-xl shadow-lg shadow-blue-200 transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)]"
              [style.transform]="sliderTranslate">
            </div>

            <button (click)="setFilter('daily')"
              [class]="filterMode === 'daily' ? 'text-white' : 'text-slate-500 hover:text-slate-800'"
              class="relative z-10 px-5 py-2 rounded-xl text-center text-[10px] font-black tracking-widest uppercase transition-colors duration-300">
              <span class="sm:hidden">D</span>
              <span class="hidden sm:inline">Daily</span>
            </button>
            <button (click)="setFilter('weekly')"
              [class]="filterMode === 'weekly' ? 'text-white' : 'text-slate-500 hover:text-slate-800'"
              class="relative z-10 px-5 py-2 rounded-xl text-center text-[10px] font-black tracking-widest uppercase transition-colors duration-300">
              <span class="sm:hidden">W</span>
              <span class="hidden sm:inline">Weekly</span>
            </button>
            <button (click)="setFilter('monthly')"
              [class]="filterMode === 'monthly' ? 'text-white' : 'text-slate-500 hover:text-slateateBlue-800'"
              class="relative z-10 px-5 py-2 rounded-xl text-center text-[10px] font-black tracking-widest uppercase transition-colors duration-300">
              <span class="sm:hidden">M</span>
              <span class="hidden sm:inline">Monthly</span>
            </button>
            <button (click)="setFilter('yearly')"
              [class]="filterMode === 'yearly' ? 'text-white' : 'text-slate-500 hover:text-slate-800'"
              class="relative z-10 px-5 py-2 rounded-xl text-center text-[10px] font-black tracking-widest uppercase transition-colors duration-300">
              <span class="sm:hidden">Y</span>
              <span class="hidden sm:inline">Yearly</span>
            </button>

          </div>
        </div>

        <span
          class="text-[10px] font-black text-blue-600 bg-blue-50 border border-blue-100 px-4 py-2.5 rounded-2xl tracking-widest uppercase">
          kWh Units
        </span>
      </div>
    </div>

    <div class="h-[220px] sm:h-[350px] w-full rounded-2xl bg-slate-50/50 p-4 border border-slate-100">
      <canvas #overallChartCanvas></canvas>
    </div>

  </div>
</div>
