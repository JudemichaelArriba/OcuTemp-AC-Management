<ng-container>
  <tr class="hover:bg-blue-50/50 transition-all duration-150 group">

    <td class="px-6 py-4 min-w-0">
      <div class="flex items-center gap-3 min-w-0">
        <span class="text-sm font-bold text-slate-900 break-words min-w-0">{{ user.fullName || 'Unknown' }}</span>
      </div>
    </td>

    <td class="px-6 py-4">
      <span
        class="inline-flex items-center px-3 py-1 rounded-lg text-[11px] font-bold uppercase"
        [ngClass]="getRoleBadgeClass(user.role)"
      >
        {{ user.role || 'N/A' }}
      </span>
    </td>

    <td class="px-6 py-4 text-sm text-slate-600 font-medium break-all max-w-[220px] sm:max-w-none">
      {{ user.email || '--' }}
    </td>

    <td class="hidden md:table-cell px-6 py-4">
      @if (formatLastLogin(user.lastLoginAt); as login) {
        <div class="flex items-center gap-1.5">
          @if (login.isRecent) {
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
          }
          <span class="text-sm text-slate-500 font-medium">{{ login.text }}</span>
        </div>
      }
    </td>

    <td class="px-6 py-4 text-right">
      <div class="flex flex-wrap justify-end gap-2">

        @if (!user.approved) {
          <button
            (click)="onApprove()"
            [disabled]="isUpdating"
            title="Approve user"
            class="flex items-center gap-1.5 px-3 py-1.5 text-emerald-600 bg-emerald-50 hover:bg-emerald-100 rounded-lg transition-all text-[11px] font-bold disabled:opacity-50 disabled:cursor-not-allowed"
          >
            @if (isUpdating) {
              <span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span>
            } @else {
              <span class="material-symbols-outlined text-[18px]">check_circle</span>
            }
            {{ isUpdating ? 'Approving...' : 'Approve' }}
          </button>
        }

        @if (user.approved) {
          <button
            (click)="openEditModal()"
            title="Edit user"
            class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all"
          >
            <span class="material-symbols-outlined text-[20px]">edit</span>
          </button>
          <button
            (click)="onRestrict()"
            [disabled]="isUpdating"
            title="Restrict user access"
            class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed"
          >
            @if (isUpdating) {
              <span class="material-symbols-outlined text-[20px] animate-spin">progress_activity</span>
            } @else {
              <span class="material-symbols-outlined text-[20px]">block</span>
            }
          </button>
        }

      </div>
    </td>
  </tr>
</ng-container>


<app-edit-user-modal
  [user]="editUser"
  (closed)="onEditModalClosed()"
  (userUpdated)="onUserUpdated($event)"
></app-edit-user-modal>
