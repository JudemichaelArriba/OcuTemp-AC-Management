<div
  class="relative w-full h-full bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm select-none">

  <div class="absolute top-4 right-4 z-20 flex flex-col items-center gap-1.5">

    <div class="bg-white/90 backdrop-blur-sm border border-slate-200/80 rounded-2xl px-3 py-1 shadow-sm">
      <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest tabular-nums">{{ zoomPercent
        }}%</span>
    </div>

    <button (click)="zoomIn($event)" title="Zoom In" class="w-9 h-9 bg-white/90 backdrop-blur-sm border border-slate-200/80 rounded-xl flex items-center justify-center text-slate-600
             hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600
             active:scale-90 transition-all duration-150 shadow-sm">
      <span class="material-symbols-outlined text-[18px]">add</span>
    </button>

    <button (click)="zoomOut($event)" title="Zoom Out" class="w-9 h-9 bg-white/90 backdrop-blur-sm border border-slate-200/80 rounded-xl flex items-center justify-center text-slate-600
             hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600
             active:scale-90 transition-all duration-150 shadow-sm">
      <span class="material-symbols-outlined text-[18px]">remove</span>
    </button>

    <button (click)="resetView($event)" title="Reset View" class="w-9 h-9 bg-white/90 backdrop-blur-sm border border-slate-200/80 rounded-xl flex items-center justify-center text-slate-600
             hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600
             active:scale-90 transition-all duration-150 shadow-sm">
      <span class="material-symbols-outlined text-[18px]">fit_screen</span>
    </button>
  </div>


  @if (activeRoomId) {
  <div class="absolute top-4 left-4 z-20 flex items-center gap-2
                bg-blue-600 text-white text-[10px] font-black uppercase tracking-[0.15em]
                px-4 py-2 rounded-2xl shadow-lg shadow-blue-200/60 pointer-events-none">
    <span class="size-1.5 rounded-full bg-white opacity-80 animate-pulse"></span>
    {{ activeRoomId.replace(/-/g, ' ') }}
  </div>
  }


  @if (!activeRoomId) {
  <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-20 pointer-events-none
                flex items-center gap-2 bg-white/80 backdrop-blur-sm border border-slate-200/70
                text-[10px] font-black text-slate-400 uppercase tracking-widest
                px-4 py-2 rounded-2xl shadow-sm whitespace-nowrap">
    <span class="material-symbols-outlined text-[13px]">touch_app</span>
    Click a room · Scroll to zoom · Drag to pan
  </div>
  }
