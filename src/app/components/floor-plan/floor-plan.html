<div class="relative w-full h-full bg-white rounded-[2.5rem] border border-slate-200 overflow-hidden shadow-2xl select-none">
  
  <div class="absolute top-6 right-6 z-20 flex flex-col items-center gap-2">
    <div class="bg-white/70 backdrop-blur-md border border-slate-200/50 rounded-3xl p-1.5 shadow-xl flex flex-col gap-1">
      <button (click)="zoomIn($event)" class="w-11 h-11 rounded-2xl flex items-center justify-center text-slate-700 hover:bg-blue-600 hover:text-white transition-all">
        <span class="material-symbols-outlined text-[20px]">add</span>
      </button>
      <button (click)="zoomOut($event)" class="w-11 h-11 rounded-2xl flex items-center justify-center text-slate-700 hover:bg-blue-600 hover:text-white transition-all">
        <span class="material-symbols-outlined text-[20px]">remove</span>
      </button>
      <div class="h-[1px] bg-slate-200/50 mx-2"></div>
      <button (click)="resetView($event)" class="w-11 h-11 rounded-2xl flex items-center justify-center text-slate-700 hover:bg-blue-600 hover:text-white transition-all">
        <span class="material-symbols-outlined text-[20px]">filter_center_focus</span>
      </button>
    </div>
    <div class="bg-slate-900/90 text-white px-4 py-1.5 rounded-full text-[11px] font-bold shadow-lg">
      {{ zoomPercent }}%
    </div>
  </div>

  @if (activeRoomId) {
    <div class="absolute top-6 left-6 z-20 flex items-center gap-4 bg-white/80 backdrop-blur-xl border border-slate-200 p-2.5 pr-6 rounded-[20px] shadow-2xl animate-in fade-in slide-in-from-left-5">
      <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
        <span class="material-symbols-outlined">analytics</span>
      </div>
      <div>
        <div class="text-[10px] uppercase font-black text-slate-400 tracking-widest leading-none mb-1">Active Monitoring</div>
        <div class="text-sm font-bold text-slate-900 leading-none">{{ activeRoomId.replace(/-/g, ' ') }}</div>
      </div>
    </div>
  }
