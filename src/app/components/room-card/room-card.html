<article
  class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden transition-all duration-200 hover:border-blue-300 hover:shadow-lg hover:-translate-y-0.5 w-58"
  [ngClass]="{
    'opacity-60 saturate-50 grayscale-[0.2]': room.power === false,
    'opacity-100 saturate-100 grayscale-0': room.power === true
  }">
  <div class="p-3 border-b border-slate-100 bg-gradient-to-br from-blue-50 via-indigo-50/30 to-slate-50">
    <div class="flex items-start justify-between gap-2">
      <div class="min-w-0 flex-1">
        <p class="text-[9px] font-bold uppercase tracking-wide text-slate-400/80">
          {{ room.uid }}
        </p>
        <h3 class="text-sm font-bold text-slate-900 mt-0.5 truncate">{{ room.roomName }}</h3>
      </div>

      <div class="relative">
        <button (click)="toggleDropdown()"
          class="text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all hover:scale-110">
          <span class="material-symbols-outlined text-[15px]">more_horiz</span>
        </button>

        @if (isDropdownOpen()) {
        <div (click)="closeDropdown()" class="fixed inset-0 z-10" style="background: transparent;">
        </div>

        <div
          class="absolute right-0 top-8 z-20 w-40 bg-white/95 backdrop-blur-xl rounded-xl shadow-xl border border-slate-200/60 py-2 overflow-hidden">

        
          <button (click)="viewDetails()"
            class="w-full text-left px-3.5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 flex items-center gap-2.5 transition-all group">
            <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>View Details</span>
          </button>

          <div class="h-px bg-gradient-to-r from-transparent via-slate-200 to-transparent my-1.5"></div>

     
          <button
            class="w-full px-3.5 py-2.5 text-left text-sm font-medium text-emerald-600 hover:bg-gradient-to-r hover:from-emerald-50/80 hover:to-emerald-100/60 hover:text-emerald-700 flex items-center gap-2.5 transition-all group">
            <span
              class="material-symbols-outlined text-base group-hover:scale-110 transition-transform">power_settings_new</span>
            <span>Power On</span>
          </button>

  
          <button
            class="w-full px-3.5 py-2.5 text-left text-sm font-medium text-red-600 hover:bg-gradient-to-r hover:from-red-50/80 hover:to-red-100/60 hover:text-red-700 flex items-center gap-2.5 transition-all group">
            <span
              class="material-symbols-outlined text-base group-hover:scale-110 transition-transform">power_settings_new</span>
            <span>Power Off</span>
          </button>

        </div>
        }
      </div>

      <span class="inline-flex items-center px-2 py-1 rounded-full text-[8px] font-bold uppercase shrink-0 shadow-sm"
        [ngClass]="statusBadgeClass">
        {{ statusText }}
      </span>

    </div>
  </div>

  <div class="p-3 space-y-2.5 bg-gradient-to-b from-white to-slate-50/30">
    <div class="grid grid-cols-2 gap-2">
      <div
        class="rounded-xl border border-cyan-200/60 bg-gradient-to-br from-cyan-50 via-cyan-50/80 to-cyan-100/40 p-2 shadow-sm hover:shadow-md transition-shadow">
        <div class="flex items-center gap-1.5 mb-1">
          <span class="material-symbols-outlined text-cyan-600 text-[13px]">thermostat</span>
          <span class="text-[8px] font-bold uppercase tracking-wide text-cyan-700">Temp</span>
        </div>
        <p class="text-xs font-extrabold text-slate-900">{{ temperatureText }}</p>
      </div>

      <div
        class="rounded-xl border border-blue-200/60 bg-gradient-to-br from-blue-50 via-blue-50/80 to-blue-100/40 p-2 shadow-sm hover:shadow-md transition-shadow">
        <div class="flex items-center gap-1.5 mb-1">
          <span class="material-symbols-outlined text-blue-600 text-[13px]">water_drop</span>
          <span class="text-[8px] font-bold uppercase tracking-wide text-blue-700">Humid</span>
        </div>
        <p class="text-xs font-extrabold text-slate-900">{{ humidityText }}</p>
      </div>
    </div>

    <div
      class="rounded-xl border border-slate-200/60 bg-gradient-to-br from-slate-50/80 to-slate-100/40 p-2 space-y-1.5 shadow-sm">
      <div class="flex items-center justify-between">
        <p class="text-[8px] font-bold uppercase tracking-wide text-slate-500">Device</p>
        <p class="text-[10px] font-semibold text-slate-800 truncate max-w-[120px]">{{ room.device || 'Not linked' }}</p>
      </div>
      <div class="h-px bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>
      <div class="flex items-center justify-between">
        <p class="text-[8px] font-bold uppercase tracking-wide text-slate-500">Schedules</p>
        <p class="text-[10px] font-semibold text-slate-800">{{ scheduleCount }}</p>
      </div>
      <div class="h-px bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>
      <div class="flex items-center justify-between">
        <p class="text-[8px] font-bold uppercase tracking-wide text-slate-500">Occupancy</p>
        <p class="text-[10px] font-semibold text-slate-800">{{ occupancyText }}</p>
      </div>
    </div>


  </div>
</article>
