@if (visible) {
<div class="eu-backdrop fixed inset-0 z-[60] flex items-center justify-center p-4" (click)="onBackdropClick($event)">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity duration-180 ease-out"
    [class.opacity-100]="animating" [class.opacity-0]="!animating"></div>
  <div class="relative w-full max-w-xl bg-white rounded-2xl shadow-2xl border border-slate-200/80
             transition-all duration-180 ease-out flex flex-col max-h-[90vh]" [class.opacity-100]="animating"
    [class.opacity-0]="!animating" [class.scale-100]="animating" [class.scale-95]="!animating"
    [class.translate-y-0]="animating" [class.-translate-y-2]="!animating" (click)="$event.stopPropagation()"
    role="dialog" aria-modal="true">

    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div
          class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-sm">
          <span class="material-symbols-outlined text-white text-[20px]">edit</span>
        </div>
        <div>
          <h3 class="text-base font-bold text-slate-800">Edit Room</h3>
          <p class="text-[11px] text-slate-500 mt-0.5">Update room info, device, and schedules</p>
        </div>
      </div>
      <button (click)="close()" [disabled]="isSaving" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-slate-700
                 hover:bg-slate-100 rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </div>

    <div class="px-4 py-4 space-y-4 overflow-y-auto flex-1">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-4">
          <h4 class="text-sm font-semibold text-slate-700">Room Details</h4>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
              Room Name <span class="text-red-500">*</span>
            </label>
            <input type="text" [(ngModel)]="roomName" maxlength="50" placeholder="Enter room name" [disabled]="isSaving"
              class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-800
                       focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500
                       disabled:bg-slate-50 disabled:text-slate-400 transition-all placeholder:text-slate-400" />
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
              Device UID <span class="text-red-500">*</span>
            </label>
            <app-drop-down [options]="deviceOptions" [value]="selectedDevice" [disabled]="isSaving || isLoadingDevices"
              placeholder="Select a device UID" variant="device" icon="memory"
              (valueChange)="selectedDevice = $event" />
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
              Status <span class="text-red-500">*</span>
            </label>
            <div class="flex items-center gap-2">
              <button type="button" (click)="setStatus('active')" [disabled]="isSaving" class="px-3.5 py-2 text-sm font-semibold rounded-xl border transition-colors
                         disabled:opacity-50 disabled:cursor-not-allowed" [class.bg-blue-600]="status === 'active'"
                [class.text-white]="status === 'active'" [class.border-blue-600]="status === 'active'"
                [class.bg-white]="status !== 'active'" [class.text-slate-600]="status !== 'active'"
                [class.border-slate-200]="status !== 'active'">
                Active
              </button>
              <button type="button" (click)="setStatus('inactive')" [disabled]="isSaving" class="px-3.5 py-2 text-sm font-semibold rounded-xl border transition-colors
                         disabled:opacity-50 disabled:cursor-not-allowed" [class.bg-slate-700]="status === 'inactive'"
                [class.text-white]="status === 'inactive'" [class.border-slate-700]="status === 'inactive'"
                [class.bg-white]="status !== 'inactive'" [class.text-slate-600]="status !== 'inactive'"
                [class.border-slate-200]="status !== 'inactive'">
                Inactive
              </button>
            </div>
          </div>

        </div>

        <app-schedule-builder [schedules]="schedules" (schedulesChange)="schedules = $event" [disabled]="isSaving"
          variant="edit" heading="Schedule Builder" />
      </div>
    </div>


    <div class="flex items-center justify-end gap-2 px-4 py-3 border-t border-slate-100 bg-slate-50/50 rounded-b-2xl">
      <button (click)="close()" [disabled]="isSaving" class="px-4 py-2.5 text-sm font-semibold text-slate-600 bg-white border border-slate-200
                 rounded-xl hover:bg-slate-50 hover:border-slate-300 transition-colors
                 disabled:opacity-50 disabled:cursor-not-allowed">
        Cancel
      </button>
      <button (click)="onSave()" [disabled]="isSaving" class="px-4 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700
                 rounded-xl shadow-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed
                 flex items-center gap-2">
        @if (isSaving) {
        <span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span>
        } @else {
        <span class="material-symbols-outlined text-[18px]">check</span>
        }
        {{ isSaving ? 'Saving...' : 'Save Changes' }}
      </button>
    </div>
  </div>
</div>
}
