@if (visible) {
<div class="fixed inset-0 z-[70] flex items-center justify-center p-4 transition-all duration-300 eu-backdrop" (click)="onBackdropClick($event)">
  <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md transition-opacity duration-300 ease-out"
    [class.opacity-100]="animating" [class.opacity-0]="!animating"></div>

  <div class="relative w-full max-w-4xl bg-white/95 backdrop-blur-xl rounded-[2.5rem] shadow-2xl border border-white
               transition-all duration-300 ease-out flex flex-col max-h-[90vh] overflow-hidden" 
    [class.opacity-100]="animating" [class.opacity-0]="!animating" 
    [class.scale-100]="animating" [class.scale-95]="!animating"
    [class.translate-y-0]="animating" [class.-translate-y-4]="!animating" 
    (click)="$event.stopPropagation()" role="dialog" aria-modal="true">

    <div class="flex items-center justify-between px-8 py-6 border-b border-slate-100 bg-gradient-to-br from-white to-blue-50/30">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-200">
          <span class="material-symbols-outlined text-white text-2xl">edit_note</span>
        </div>
        <div>
          <h3 class="text-xl font-black text-slate-900 tracking-tight leading-none">Edit Room</h3>
          <p class="text-[11px] font-bold text-blue-500 mt-1.5 uppercase tracking-widest">Configuration & Scheduling</p>
        </div>
      </div>
      <button (click)="close()" [disabled]="isSaving" 
        class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-white hover:shadow-sm rounded-xl transition-all disabled:opacity-40 border border-transparent hover:border-slate-100">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="px-8 py-8 space-y-8 overflow-y-auto flex-1 custom-scrollbar">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
          <div class="flex items-center gap-2 mb-2">
            <div class="w-1.5 h-4 bg-blue-600 rounded-full"></div>
            <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">General Details</h4>
          </div>

          <div class="space-y-2">
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">
              Room Identity <span class="text-blue-500">*</span>
            </label>
            <input type="text" [(ngModel)]="roomName" maxlength="50" placeholder="e.g. Server Room A" [disabled]="isSaving"
              class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-800
                       focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-600
                       disabled:bg-slate-50 disabled:text-slate-400 transition-all placeholder:text-slate-300" />
          </div>

          <div class="space-y-2">
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">
              Hardware Link <span class="text-blue-500">*</span>
            </label>
            <app-drop-down [options]="deviceOptions" [value]="selectedDevice" [disabled]="isSaving || isLoadingDevices"
              placeholder="Assign Device UID" variant="device" 
              (valueChange)="selectedDevice = $event" />
          </div>

          <div class="space-y-2">
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">
              Operational Status <span class="text-blue-500">*</span>
            </label>
            <div class="flex items-center gap-2 p-1.5 bg-slate-100/50 rounded-2xl border border-slate-200/50">
              <button type="button" (click)="setStatus('active')" [disabled]="isSaving" 
                class="flex-1 px-4 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all"
                [class.bg-blue-600]="status === 'active'" [class.text-white]="status === 'active'" [class.shadow-lg]="status === 'active'" [class.shadow-blue-500/30]="status === 'active'"
                [class.text-slate-400]="status !== 'active'" [class.hover:text-blue-600]="status !== 'active'">
                Active
              </button>
              <button type="button" (click)="setStatus('inactive')" [disabled]="isSaving" 
                class="flex-1 px-4 py-2.5 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all"
                [class.bg-slate-800]="status === 'inactive'" [class.text-white]="status === 'inactive'" [class.shadow-lg]="status === 'inactive'"
                [class.text-slate-400]="status !== 'inactive'" [class.hover:text-slate-600]="status !== 'inactive'">
                Inactive
              </button>
            </div>
          </div>
        </div>

        <div class="lg:col-span-7">
          <div class="bg-slate-50/50 border border-slate-100 rounded-3xl p-2 transition-all hover:bg-white hover:shadow-inner">
            <app-schedule-builder [schedules]="schedules" (schedulesChange)="schedules = $event" [disabled]="isSaving"
              variant="edit" heading="Automation Logic" />
          </div>
        </div>
      </div>
    </div>

    <div class="flex items-center justify-end gap-3 px-8 py-6 border-t border-slate-100 bg-slate-50/80 backdrop-blur-md">
      <button (click)="close()" [disabled]="isSaving" 
        class="px-6 py-3.5 text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-slate-800 hover:bg-white rounded-2xl transition-all disabled:opacity-50">
        Discard
      </button>
      <button (click)="onSave()" [disabled]="isSaving" 
        class="group flex items-center gap-3 px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-[10px] uppercase tracking-[0.15em] transition-all shadow-xl shadow-blue-600/20 active:scale-95 disabled:opacity-50">
        @if (isSaving) {
          <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          <span>Syncing...</span>
        } @else {
          <span class="material-symbols-outlined text-lg transition-transform group-hover:rotate-12">check_circle</span>
          <span>Commit Changes</span>
        }
      </button>
    </div>
  </div>
</div>
}
