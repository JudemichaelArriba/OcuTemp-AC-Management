<div class="flex h-screen overflow-hidden bg-slate-50">
  <app-sidebar #sidebar />

  <main class="flex-1 overflow-y-auto transition-all duration-500 ease-in-out"
    [class.ml-64]="!sidebar.isMobile() && sidebar.isOpen()" [class.ml-[72px]]="!sidebar.isMobile() && !sidebar.isOpen()"
    [class.pt-[5.5rem]]="sidebar.isMobile()" [class.p-6]="!sidebar.isMobile()" [class.p-4]="sidebar.isMobile()">

    <div class="container mx-auto">
      <router-outlet></router-outlet>
    </div>
  </main>

  <app-snack-bar></app-snack-bar>
</div>
