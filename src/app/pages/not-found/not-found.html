<main class="min-h-full font-sans bg-gradient-to-br from-slate-50 via-blue-50/30 to-slate-100 flex items-center justify-center p-6">
  <div class="max-w-lg w-full bg-white/90 backdrop-blur-sm border border-slate-200/60 rounded-2xl px-8 py-10 shadow-lg text-center">
    <div class="mx-auto w-16 h-16 rounded-full bg-gradient-to-br from-blue-600 via-blue-500 to-blue-600 flex items-center justify-center text-white text-2xl font-black shadow-xl ring-4 ring-blue-100">
      404
    </div>

    <h1 class="mt-6 text-2xl font-black text-slate-900 tracking-tight">Page not found</h1>
    <p class="mt-2 text-sm text-slate-600">
      The page you’re looking for doesn’t exist or may have been moved.
    </p>

    <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
      <a routerLink="/app/dashboard"
        class="px-6 py-3 text-sm font-bold text-white bg-gradient-to-r from-blue-600 to-blue-500 rounded-xl shadow-lg hover:shadow-xl hover:from-blue-700 hover:to-blue-600 transition-all duration-200">
        Go to Dashboard
      </a>
      <a routerLink="/login"
        class="px-6 py-3 text-sm font-bold border-2 border-slate-300 rounded-xl hover:bg-slate-50 transition-all duration-200">
        Back to Login
      </a>
    </div>
  </div>
</main>
